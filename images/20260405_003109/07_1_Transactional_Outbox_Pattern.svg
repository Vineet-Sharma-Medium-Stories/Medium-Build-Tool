    </text>
    
    <!-- Bottom bar -->
    <rect x="0" y="750" width="1200" height="50" fill="#F0F0F0"/>
    <text x="1050" y="780" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#666666">
