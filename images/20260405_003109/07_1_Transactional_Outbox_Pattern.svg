<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
    <!-- Background -->
    <rect width="1200" height="800" fill="#FFFFFF"/>
    <rect width="1200" height="80" fill="#0078D4"/>
    
    <!-- Title -->
    <text x="50" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#FFFFFF" font-weight="bold">
        1 Transactional Outbox Pattern
    </text>
    
    <!-- Info Box -->
    <rect x="50" y="150" width="1100" height="500" rx="10" ry="10" fill="#F8F9FA" stroke="#0078D4" stroke-width="2"/>
    <text x="70" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0078D4" font-weight="bold">
        Diagram Generation Information
    </text>
    
    <text x="70" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#333333">
        • Gemini API returned an error for this prompt
    </text>
    <text x="70" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#333333">
